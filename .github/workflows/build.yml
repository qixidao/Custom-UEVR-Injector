name: Build Custom-UEVR-Injector

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Setup NuGet
        uses: nuget/setup-nuget@v1

      - name: Restore NuGet packages
        run: nuget restore GUI/Custom_UEVR_Injector.sln

      - name: Build Solution
        run: msbuild GUI/Custom_UEVR_Injector.sln /t:Build /p:Configuration=Release /p:Platform=x64

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Custom-UEVR-Injector
          path: |
            GUI/bin/x64/Release/*.exe
            GUI/bin/x64/Release/*.dll
